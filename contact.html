<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Health Guide</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #131314; color: #e3e3e3; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { max-width: 800px; width: 100%; }
        nav { background: #1e1f20; padding: 15px; border-radius: 12px; margin-bottom: 30px; text-align: center; }
        nav a { color: #8ab4f8; text-decoration: none; margin: 0 15px; }
        .card { background: #1e1f20; padding: 30px; border-radius: 24px; border: 1px solid #444746; }
        h1 { color: #fff; }
        
        /* Modern Form Styling */
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input, textarea, select {
            background: #28292a;
            border: 1px solid #444746;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus { outline: 1px solid #8ab4f8; }
        button {
            background: #8ab4f8;
            color: #131314;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #c4eed0; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">Home</a>
            <a href="diet.html">Diet</a>
            <a href="exercise.html">Exercise</a>
            <a href="contact.html"><b>Contact</b></a>
        </nav>
        <div class="card">
            <h1>Send Us Your Feedback</h1>
            <p>Have a health tip to share? Fill out the form below!</p>
            
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <select>
                    <option disabled selected>How often do you exercise?</option>
                    <option>Daily</option>
                    <option>Weekly</option>
                    <option>Hardly ever</option>
                </select>
                <textarea rows="4" placeholder="Your health message..."></textarea>
                <button type="submit">Send Feedback</button>
            </form>
        </div>
    </div>
</body>
</html>
