<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Lifestyle | Student Guide</title>
    <style>
        /* This CSS makes it look like a modern UI */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #131314; /* Dark Gemini background */
            color: #e3e3e3;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        nav {
            background: #1e1f20;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        nav a {
            color: #8ab4f8;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }

        .card {
            background: #1e1f20;
            padding: 30px;
            border-radius: 24px; /* Soft rounded corners */
            border: 1px solid #444746;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h1 { color: #fff; font-size: 2.5rem; }
        h2 { color: #c4eed0; } /* Minty accent color */
        
        img {
            border-radius: 16px;
            width: 100%;
            height: auto;
            margin-top: 20px;
        }

        .pill-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pill-list li {
            background: #333537;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="index.html">Home</a>
            <a href="diet.html">Diet</a>
            <a href="exercise.html">Exercise</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="card">
            <h1>Healthy Lifestyle for Students</h1>
            <p>Welcome! Maintaining a <b>healthy lifestyle</b> isn't just about gym sessions; it's about <i>consistency</i> and <u>mental clarity</u>.</p>
            
            <h2>Core Pillars</h2>
            <ul class="pill-list">
                <li>🍎 Nutritious Eating</li>
                <li>🏃 Regular Activity</li>
                <li>😴 8-Hour Sleep</li>
                <li>🧘 Stress Control</li>
            </ul>

            <img src="healthy-food.jpg" alt="Healthy Student Meals">
        </div>
    </div>

</body>
</html>
